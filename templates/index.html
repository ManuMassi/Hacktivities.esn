<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESN Cagliari Image Resizer</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <div class="container">
        <div class="card">

            <!-- Logo -->
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="ESN Cagliari Logo" class="logo">

            <h1>ESN Cagliari Image Resizer</h1>

            <!-- Flash messages -->
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <ul class="flashes">
                        {% for message in messages %}
                            <li>{{ message }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}

            <!-- Upload form -->
            <form action="/" method="post" enctype="multipart/form-data">

                <label for="file" class="file-label" id="drop-area">
                    <span id="upload-text">📁 Click or drag an image here</span>
                    <span id="file-name" style="display:none;"></span>
                </label>

                <input type="file" name="file" id="file" accept="image/*" required>

                <!-- Preview -->
                <img id="preview" style="display:none; width:100%; border-radius:12px; margin-top:10px;" />

                <!-- Size selector -->
                <select name="size" id="size">
                    <option value="other">1200x899 - Gallery Photo</option>
                    <option value="main">1920x460 - Banner</option>
                </select>

                <button type="submit">Resize Image</button>
            </form>

            <!-- Result -->
            {% if image_url %}
            <div class="result">
                <h2>Resized Image</h2>
                <img src="{{ image_url }}" alt="Resized Image">
                <a href="{{ image_url }}" download>Download Image</a>
            </div>
            {% endif %}

        </div>
    </div>

    <!-- JS (fixed, mobile-safe, no click hacks) -->
    <script>
        const dropArea = document.getElementById("drop-area");
        const fileInput = document.getElementById("file");
        const fileName = document.getElementById("file-name");
        const uploadText = document.getElementById("upload-text");
        const preview = document.getElementById("preview");

        // File selection (mobile + desktop safe)
        fileInput.addEventListener("change", () => {
            handleFile(fileInput.files[0]);
        });

        // Drag over
        dropArea.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropArea.style.borderColor = "#0066ff";
            dropArea.style.background = "#eef4ff";
        });

        // Drag leave
        dropArea.addEventListener("dragleave", () => {
            dropArea.style.borderColor = "";
            dropArea.style.background = "";
        });

        // Drop
        dropArea.addEventListener("drop", (e) => {
            e.preventDefault();

            const file = e.dataTransfer.files[0];
            fileInput.files = e.dataTransfer.files;
            handleFile(file);
        });

        // Shared handler
        function handleFile(file) {
            if (!file) return;

            // UI feedback
            uploadText.style.display = "none";
            fileName.style.display = "block";
            fileName.textContent = "✅ " + file.name;

            // Preview
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = "block";
            };
            reader.readAsDataURL(file);
        }
    </script>

</body>
</html>
